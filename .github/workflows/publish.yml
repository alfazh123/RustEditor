name: Publish to npm (OIDC)

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  id-token: write  # OIDC token
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Check if version exists on npm
        id: check_version
        run: |
          VERSION=$(grep '"version"' pkg/package.json | sed 's/.*"version": "\(.*\)".*/\1/')
          if npm view rust-editor@$VERSION > /dev/null 2>&1; then
            echo "Version $VERSION already published"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.org/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM package
        run: wasm-pack build --target web

      - name: Setup Node.js with OIDC
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm using OIDC
        run: cd pkg && npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}