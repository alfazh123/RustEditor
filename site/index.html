<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rust Image Editor</title>
    <style>

        body {
            height: 100vh;
            margin: 0;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }

        /* .container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            background-color: #f0f0f0;
        } */

        .image-container {
            position: relative;
            height: 80vh;
            width: 100%;
            /* overflow: scroll; */
            scrollbar-width: none;
        }

        /* #editing-canvas {
            position: absolute;
            top: 0;
            left: 0;
        } */

        .image-wrapper {
            width: fit-content;
            height: fit-content;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-height: 80vh;
        }

        /* #image,
        #reference-image {
            width: 50%;  
            height: 50%;
            border-radius: 10px;
            display: none;
        } */

        canvas {
            display: none;
        }

        #image {
            height: 700px;
            border-radius: 10px;
            display: none;
        }

        #reference-image {
            width: 200px;
            border-radius: 10px;
            display: none;
        }

        .navigation {
            position: absolute;
            bottom: 0;
            display: flex;
            flex-direction: column;
            margin: 10px;
        }

        #bottom-nav {
            display: flex;
            justify-content: space-around;
            background-color: #f0f0f0;
        }

        #action-wrapper {
            display: flex;
            flex-direction: column;
            margin: 10px;
            gap: 5px;
        }

        .target-nav {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0;
            padding: 10px;
            border-radius: 10px;
        }

        .target-nav.active {
            display: flex;
        }

        .nav-item {
            cursor: pointer;
            padding: 10px;
            background-color: #e0e0e0;
            border-radius: 5px;
            margin: 5px;
        }

        .nav-item.active {

            background-color: #d0d0d0;
        }

        #action-crop-wrapper,
        #action-adjust-wrapper,
        #action-filter-wrapper {
            flex-direction: column;
            margin: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="image-container">
            <div id="image-wrapper" class="image-wrapper">
                <img id="image">
                <canvas id="editing-canvas" width="1000" height="700"></canvas>
                <label class="label-center" for="file-input" style="z-index: 10;">
                    Lets Edit 
                    <input style="display: none;" type="file" id="file-input" accept="image/*">
                </label>
                <div id="crop-area"></div>
            </div>
        </div>
        <div class="navigation">
    
            <div id="action-wrapper">
                
                <div class="target-nav" id="action-adjust-wrapper">
                    Hue
                    <br>
                    saturation
                    <br>
                    contrast
                    <br>
                    temperature
                    <br>
                    tint
                    <br>
                    brightness
                    <br>
                    exposure
                    <br>
                    vibrance
                    <br>
                    shadows
                    <br>
                    highlights
                </div>
        
                <div class="target-nav" id="action-crop-wrapper">
                    <label for="scale">Scale:</label>
                    <select id="scale-option">
                        <option value="1">1x</option>
                        <option value="2">2x</option>
                        <option value="3">3x</option>
                    </select>
                    <label for="width">Width</label>
                    <input placeholder="..." type="number" id="width">
                    <label for="height">Height</label>
                    <input placeholder="..." type="number" id="height">
                </div>
        
                <div class="target-nav" id="action-filter-wrapper">
                    <label for="reference">
                        <img src="" alt="" id="reference-image">
                    </label>
                    <input type="file" id="reference" accept="image/*">
                    <button id="switch-btn">Switch</button>
                </div>
        
                <div class="target-nav" id="action-enhance-wrapper">
                    <label for="sharpen-range">Sharpen</label>
                    <input type="range" id="sharpen-range" min="0" max="10" value="0" step="1">
                    <p id="value-sharp">0</p>
                </div>
            </div>
        
            <div id="bottom-nav">
                <div class="nav-item" id="adjust-nav">Adjust</div>
                <div class="nav-item" id="crop-nav">Crop & Resize</div>
                <div class="nav-item" id="filter-nav">Filter</div>
                <div class="nav-item" id="enhance-nav">Enhance</div>
            </div>

            <div>
                <label for="zoom">Zoom</label>
                <input type="range" name="" id="zoom" min="10" max="200" value="100" step="1">
            </div>
        </div>
    </div>


    <script type="module" src="index.js"></script>
    <!-- <script src="./navigation.js"></script> -->
</body>
</html>
